<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LSK Prestige | Real Estate Developers</title>

    <!-- ================= FAVICON ================= -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/images/favicon/site.webmanifest" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon/android-chrome-512x512.png"
    />
    <meta name="theme-color" content="#121212" />
    <!-- =========================================== -->

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Material Icons -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#D4AF37", // Gold
              secondary: "#E63946", // Red
              "background-light": "#FFFFFF",
              "background-dark": "#121212",
            },
            fontFamily: {
              display: ["Playfair Display", "serif"],
              body: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .font-display {
        font-family: "Playfair Display", serif;
      }
      .sticky-header {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .custom-shadow {
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
      }
      html {
        scroll-behavior: smooth;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f8f8f8;
      }
      ::-webkit-scrollbar-thumb {
        background: #d4af37;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b6952e;
      }
      .luxury-text-gradient {
        background: linear-gradient(to right, #d4af37, #f5e050, #d4af37);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>

    <!-- React Import Map -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react/": "https://esm.sh/react@19.0.0/",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/": "https://esm.sh/react-dom@19.0.0/",
          "framer-motion": "https://esm.sh/framer-motion@11.11.11?external=react,react-dom",
          "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react,react-dom"
        }
      }
    </script>

    <!-- App CSS -->
    <link rel="stylesheet" href="/index.css" />
  </head>

  <body
    class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 transition-colors duration-300"
  >
    <div id="root"></div>

    <!-- App Entry -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
